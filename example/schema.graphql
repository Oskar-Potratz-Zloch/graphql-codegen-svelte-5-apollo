type Query {
  continents: [Continent!]!
  continent(code: ID!): Continent
  countries(filter: CountryFilterInput): [Country!]!
  country(code: ID!): Country
  languages(filter: LanguageFilterInput): [Language!]!
  language(code: ID!): Language
}

type Continent {
  code: ID!
  name: String!
  countries: [Country!]!
}

type Country {
  code: ID!
  name: String!
  native: String!
  phone: String!
  currency: String
  languages: [Language!]!
  emoji: String!
  emojiU: String
  states: [State!]!
  continent: Continent!
  capital: String
  demonym: String
  area: Float
  callingCodes: [String!]!
  currencies: [String!]!
}

type Language {
  code: ID!
  name: String
  native: String
  rtl: Boolean
}

type State {
  code: String
  name: String!
  country: Country!
}

input CountryFilterInput {
  code: StringFilterInput
  currency: StringFilterInput
  continent: StringFilterInput
}

input LanguageFilterInput {
  code: StringFilterInput
}

input StringFilterInput {
  eq: String
  ne: String
  in: [String!]
  nin: [String!]
  regex: String
}
